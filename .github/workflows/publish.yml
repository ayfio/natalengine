name: Publish to npm

# Trusted publishing via OIDC — no NPM_TOKEN secret. npm mints a short-lived
# credential from GitHub's OIDC token and auto-generates a provenance
# attestation (no --provenance flag needed). Configure the trusted publisher
# once at npmjs.com → natalengine → Settings → Trusted Publishing:
#   Organization: Unforced-Dev · Repository: natal-engine · Workflow: publish.yml
#
# Triggers on a pushed v* tag (matches the `git tag vX.Y.Z && git push --tags`
# flow) and on manual dispatch (to publish a tag that's already been pushed).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC trusted publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # Guarantee npm >= 11.5.1 (OIDC trusted publishing); some Node 24
      # builds bundle an older npm.
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      # On a tag push, refuse to publish if the tag and package.json disagree.
      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$PKG" != "${{ github.ref_name }}" ]; then
            echo "::error::Tag ${{ github.ref_name }} != package.json version $PKG"
            exit 1
          fi

      - name: Publish
        run: npm publish
